  api:
    build: .
    command: node dist/api/server.js
    ports:
      - "3000:3000"
    depends_on:
      - db-test
      - redis-test

  streamlit:
    image: python:3.11
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "pip install streamlit requests && streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    depends_on:
      - api
